<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Adminchecks Beispiel</title>
  <desc id="desc">Beispielgrafik fuer Setupwizard und Botstatus.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="60" y="50" width="1080" height="620" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="100" y="112" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Adminchecks</text>
  <text x="100" y="149" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Setup-Assistent und Botstatus helfen beim Einrichten und Pruefen.</text>

  <g font-family="Arial, sans-serif">
    <rect x="100" y="220" width="470" height="310" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="135" y="265" fill="#0f172a" font-size="24" font-weight="700">/setupwizard</text>
    <text x="135" y="305" fill="#334155" font-size="18">Gefuehrter Einstieg fuer Admins</text>
    <text x="135" y="342" fill="#334155" font-size="18">- TempVoice Setup</text>
    <text x="135" y="374" fill="#334155" font-size="18">- Panelchannel</text>
    <text x="135" y="406" fill="#334155" font-size="18">- Musik/Playlist Tabellen</text>
    <text x="135" y="438" fill="#334155" font-size="18">- Webpanel, Spotify, Modlog</text>
    <text x="135" y="485" fill="#334155" font-size="18">Buttons erklaeren naechste Schritte.</text>

    <rect x="630" y="220" width="470" height="310" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="665" y="265" fill="#0f172a" font-size="24" font-weight="700">/botstatus</text>
    <text x="665" y="305" fill="#334155" font-size="18">Technischer Systemcheck</text>
    <text x="665" y="342" fill="#334155" font-size="18">- DB und Tabellen</text>
    <text x="665" y="374" fill="#334155" font-size="18">- geladene Commands</text>
    <text x="665" y="406" fill="#334155" font-size="18">- yt-dlp und ENV Status</text>
    <text x="665" y="438" fill="#334155" font-size="18">- keine Secrets</text>
    <text x="665" y="485" fill="#334155" font-size="18">Ideal nach Deploys und Restarts.</text>
  </g>
</svg>
