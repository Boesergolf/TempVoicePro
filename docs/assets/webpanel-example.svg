<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Webpanel Beispiel</title>
  <desc id="desc">Beispielgrafik fuer den Webpanel Ablauf mit Login und Dashboard.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="60" y="50" width="1080" height="620" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="100" y="112" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Webpanel</text>
  <text x="100" y="149" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Optionales Browser-Panel fuer Serververwaltung und Spotify-Verknuepfung.</text>

  <g font-family="Arial, sans-serif">
    <rect x="100" y="220" width="300" height="130" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="130" y="262" fill="#0f172a" font-size="22" font-weight="700">1. Login</text>
    <text x="130" y="297" fill="#334155" font-size="17">Discord OAuth</text>
    <text x="130" y="325" fill="#334155" font-size="17">nur erlaubte Server</text>

    <path d="M420 285 H505" stroke="#64748b" stroke-width="4"/>
    <path d="M505 285 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="530" y="220" width="300" height="130" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="560" y="262" fill="#0f172a" font-size="22" font-weight="700">2. Dashboard</text>
    <text x="560" y="297" fill="#334155" font-size="17">Server auswaehlen</text>
    <text x="560" y="325" fill="#334155" font-size="17">Einstellungen pruefen</text>

    <path d="M850 285 H935" stroke="#64748b" stroke-width="4"/>
    <path d="M935 285 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="100" y="440" width="1000" height="110" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="130" y="483" fill="#0f172a" font-size="22" font-weight="700">Spotify OAuth</text>
    <text x="130" y="520" fill="#334155" font-size="18">Private Spotify-Playlists koennen spaeter ueber User-Login angebunden werden. HTTP ist fuer IP/Testbetrieb ok; HTTPS ist fuer oeffentliche Nutzung empfohlen.</text>
  </g>
</svg>
