<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Playlistpanel Beispiel</title>
  <desc id="desc">Beispielgrafik fuer die Playlist-Verwaltung im Discord Panel.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="60" y="50" width="1080" height="620" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="100" y="112" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Playlist-Verwaltung</text>
  <text x="100" y="149" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Playlists erstellen, befuellen, importieren und abspielen.</text>

  <g font-family="Arial, sans-serif">
    <rect x="100" y="210" width="310" height="100" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="130" y="250" fill="#0f172a" font-size="21" font-weight="700">Auswaehlen</text>
    <text x="130" y="280" fill="#334155" font-size="17">Playlist ohne Namen tippen</text>

    <rect x="445" y="210" width="310" height="100" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="475" y="250" fill="#0f172a" font-size="21" font-weight="700">Erstellen + Hinzufuegen</text>
    <text x="475" y="280" fill="#334155" font-size="17">Songs, YouTube, Spotify</text>

    <rect x="790" y="210" width="310" height="100" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="820" y="250" fill="#0f172a" font-size="21" font-weight="700">Importieren</text>
    <text x="820" y="280" fill="#334155" font-size="17">YouTube/Spotify Playlist</text>

    <rect x="100" y="390" width="485" height="110" rx="14" fill="#fdf2f8" stroke="#f9a8d4"/>
    <text x="130" y="432" fill="#0f172a" font-size="21" font-weight="700">Pflege</text>
    <text x="130" y="465" fill="#334155" font-size="17">Songs anzeigen, entfernen, Playlist loeschen</text>

    <rect x="615" y="390" width="485" height="110" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="645" y="432" fill="#0f172a" font-size="21" font-weight="700">Abspielen</text>
    <text x="645" y="465" fill="#334155" font-size="17">Playlist direkt in die Musik-Queue laden</text>
  </g>
</svg>
