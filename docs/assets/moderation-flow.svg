<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Moderation Ablauf</title>
  <desc id="desc">Beispielgrafik fuer Modlog, Warns, Timeouts, Cases und Auto-Mod.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="50" y="44" width="1100" height="632" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="90" y="102" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Moderation</text>
  <text x="90" y="139" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Nachvollziehbare Moderation mit Log, Warns, Timeouts und Cases.</text>

  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="90" y="210" width="220" height="115" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="120" y="250" fill="#0f172a" font-size="22" font-weight="700">1. Modlog</text>
    <text x="120" y="283" fill="#334155">/modlog setup</text>

    <path d="M325 268 H395" stroke="#64748b" stroke-width="4"/>
    <path d="M395 268 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="415" y="210" width="220" height="115" rx="14" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="445" y="250" fill="#0f172a" font-size="22" font-weight="700">2. Warn</text>
    <text x="445" y="283" fill="#334155">/warn user reason</text>

    <path d="M650 268 H720" stroke="#64748b" stroke-width="4"/>
    <path d="M720 268 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="740" y="210" width="270" height="115" rx="14" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="770" y="250" fill="#0f172a" font-size="22" font-weight="700">3. Eskalation</text>
    <text x="770" y="283" fill="#334155">Timeout, Kick oder Ban</text>

    <rect x="250" y="435" width="300" height="115" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="280" y="475" fill="#0f172a" font-size="22" font-weight="700">Cases & Profile</text>
    <text x="280" y="508" fill="#334155">/cases und /moduser</text>

    <rect x="650" y="435" width="300" height="115" rx="14" fill="#fdf2f8" stroke="#f9a8d4"/>
    <text x="680" y="475" fill="#0f172a" font-size="22" font-weight="700">Auto-Mod</text>
    <text x="680" y="508" fill="#334155">Spam, Links, Caps, Auto-Warn</text>

    <path d="M875 325 C835 385 735 420 650 455" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M650 455 l15 -1 -8 -13 z" fill="#64748b"/>
    <path d="M525 325 C500 385 450 420 410 435" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M410 435 l15 1 -7 -14 z" fill="#64748b"/>
  </g>
</svg>
