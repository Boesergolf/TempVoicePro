<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">TempVoice Ablauf</title>
  <desc id="desc">Beispielgrafik fuer den TempVoice Ablauf von Setup bis automatischem Cleanup.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <rect x="40" y="40" width="1120" height="600" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="80" y="95" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">TempVoice Ablauf</text>
  <text x="80" y="132" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Vom Admin-Setup bis zum eigenen temporaeren Voice Channel.</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="190" width="210" height="130" rx="14" fill="#eef6ff" stroke="#8cc5ff"/>
    <text x="105" y="232" fill="#0f172a" font-size="22" font-weight="700">1. /setup</text>
    <text x="105" y="265" fill="#334155" font-size="17">Admin erstellt</text>
    <text x="105" y="290" fill="#334155" font-size="17">Creator + Kategorie</text>

    <path d="M305 255 H385" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M385 255 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="405" y="190" width="250" height="130" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="430" y="232" fill="#0f172a" font-size="22" font-weight="700">2. Creator betreten</text>
    <text x="430" y="265" fill="#334155" font-size="17">Nutzer geht in</text>
    <text x="430" y="290" fill="#334155" font-size="17">Create Voice</text>

    <path d="M670 255 H750" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M750 255 l-14 -9 v18 z" fill="#64748b"/>

    <rect x="770" y="190" width="290" height="130" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="795" y="232" fill="#0f172a" font-size="22" font-weight="700">3. Lobby entsteht</text>
    <text x="795" y="265" fill="#334155" font-size="17">Bot erstellt Lobby 1</text>
    <text x="795" y="290" fill="#334155" font-size="17">und verschiebt Nutzer</text>

    <rect x="190" y="405" width="300" height="130" rx="14" fill="#faf5ff" stroke="#d8b4fe"/>
    <text x="215" y="447" fill="#0f172a" font-size="22" font-weight="700">4. Control Panel</text>
    <text x="215" y="480" fill="#334155" font-size="17">Buttons fuer Lock, Rename,</text>
    <text x="215" y="505" fill="#334155" font-size="17">Limit, Permanent und Close</text>

    <path d="M770 320 C690 385 575 415 510 440" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M510 440 l15 -2 -8 -13 z" fill="#64748b"/>

    <rect x="650" y="405" width="320" height="130" rx="14" fill="#fff1f2" stroke="#fda4af"/>
    <text x="675" y="447" fill="#0f172a" font-size="22" font-weight="700">5. Cleanup</text>
    <text x="675" y="480" fill="#334155" font-size="17">Leere temporaere Lobbys</text>
    <text x="675" y="505" fill="#334155" font-size="17">werden automatisch entfernt</text>

    <path d="M505 470 H630" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M630 470 l-14 -9 v18 z" fill="#64748b"/>
  </g>
</svg>
