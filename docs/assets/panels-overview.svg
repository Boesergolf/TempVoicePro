<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Zentralpanel Uebersicht</title>
  <desc id="desc">Beispielgrafik fuer das TempVoicePro Zentralpanel mit den wichtigsten Bereichen.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <rect x="50" y="44" width="1100" height="672" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="90" y="102" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Zentralpanel</text>
  <text x="90" y="139" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Ein gemeinsamer Einstieg fuer Admins und Nutzer in #bot-panels.</text>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="190" width="1020" height="90" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="120" y="226" fill="#0f172a" font-size="23" font-weight="700">TempVoicePro Kontrollzentrum</text>
    <text x="120" y="258" fill="#334155" font-size="17">Eine Nachricht, mehrere Ansichten, saubere Panel-Channels.</text>

    <rect x="90" y="330" width="300" height="120" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="120" y="371" fill="#0f172a" font-size="22" font-weight="700">Musik</text>
    <text x="120" y="405" fill="#334155" font-size="17">Play, Queue, Pause, Skip</text>

    <rect x="450" y="330" width="300" height="120" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="480" y="371" fill="#0f172a" font-size="22" font-weight="700">Playlists</text>
    <text x="480" y="405" fill="#334155" font-size="17">Anzeigen, starten, importieren</text>

    <rect x="810" y="330" width="300" height="120" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="840" y="371" fill="#0f172a" font-size="22" font-weight="700">TempVoice</text>
    <text x="840" y="405" fill="#334155" font-size="17">Lobbys und Status pruefen</text>

    <rect x="90" y="510" width="300" height="120" rx="14" fill="#fef9c3" stroke="#fde047"/>
    <text x="120" y="551" fill="#0f172a" font-size="22" font-weight="700">Gluecksrad</text>
    <text x="120" y="585" fill="#334155" font-size="17">Maps, Listen, Voice-Auswahl</text>

    <rect x="450" y="510" width="300" height="120" rx="14" fill="#fdf2f8" stroke="#f9a8d4"/>
    <text x="480" y="551" fill="#0f172a" font-size="22" font-weight="700">Module</text>
    <text x="480" y="585" fill="#334155" font-size="17">Funktionen ein-/ausschalten</text>

    <rect x="810" y="510" width="300" height="120" rx="14" fill="#fff1f2" stroke="#fda4af"/>
    <text x="840" y="551" fill="#0f172a" font-size="22" font-weight="700">Aufraeumen</text>
    <text x="840" y="585" fill="#334155" font-size="17">Panelpflege bewusst starten</text>
  </g>
</svg>
