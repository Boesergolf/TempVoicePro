<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Musikpanel Beispiel</title>
  <desc id="desc">Beispielgrafik fuer die Musiksteuerung im Zentralpanel.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="60" y="50" width="1080" height="620" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="100" y="112" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Musiksteuerung</text>
  <text x="100" y="149" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Songs suchen, Queue steuern und Playlists starten.</text>

  <g font-family="Arial, sans-serif">
    <rect x="100" y="210" width="460" height="120" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="130" y="250" fill="#0f172a" font-size="22" font-weight="700">Now Playing</text>
    <text x="130" y="284" fill="#334155" font-size="17">Aktueller Track, Quelle und Lautstaerke</text>

    <rect x="640" y="210" width="420" height="120" rx="14" fill="#f0fdf4" stroke="#86efac"/>
    <text x="670" y="250" fill="#0f172a" font-size="22" font-weight="700">Queue</text>
    <text x="670" y="284" fill="#334155" font-size="17">Naechste Tracks anzeigen und entfernen</text>

    <rect x="100" y="390" width="960" height="90" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="130" y="445" fill="#0f172a" font-size="20" font-weight="700">Buttons: Play | Playlist | Pause | Resume | Skip | Stop | Clear | Shuffle | Volume</text>

    <rect x="100" y="540" width="960" height="70" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="130" y="584" fill="#334155" font-size="18">Slash-Alternative: /music play, /music queue, /music volume, /music stop</text>
  </g>
</svg>
