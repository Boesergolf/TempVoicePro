<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Modulverwaltung</title>
  <desc id="desc">Beispielgrafik fuer die Modulverwaltung von TempVoicePro.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <rect x="50" y="44" width="1100" height="612" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="90" y="102" fill="#1f2937" font-family="Arial, sans-serif" font-size="34" font-weight="700">Modulverwaltung</text>
  <text x="90" y="139" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Admins koennen Funktionsbereiche pro Server aktivieren oder deaktivieren.</text>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="200" width="1020" height="80" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="125" y="250" fill="#0f172a" font-size="24" font-weight="700">/module list</text>
    <text x="330" y="250" fill="#334155" font-size="18">zeigt alle Module und deren Status</text>

    <g font-size="18">
      <rect x="90" y="340" width="300" height="80" rx="14" fill="#f0fdf4" stroke="#86efac"/>
      <text x="120" y="388" fill="#0f172a" font-weight="700">TempVoice</text>
      <text x="285" y="388" fill="#15803d">aktiv</text>

      <rect x="450" y="340" width="300" height="80" rx="14" fill="#f0fdf4" stroke="#86efac"/>
      <text x="480" y="388" fill="#0f172a" font-weight="700">Music</text>
      <text x="645" y="388" fill="#15803d">aktiv</text>

      <rect x="810" y="340" width="300" height="80" rx="14" fill="#f0fdf4" stroke="#86efac"/>
      <text x="840" y="388" fill="#0f172a" font-weight="700">Playlist</text>
      <text x="1005" y="388" fill="#15803d">aktiv</text>

      <rect x="90" y="470" width="300" height="80" rx="14" fill="#f0fdf4" stroke="#86efac"/>
      <text x="120" y="518" fill="#0f172a" font-weight="700">Gluecksrad</text>
      <text x="285" y="518" fill="#15803d">aktiv</text>

      <rect x="450" y="470" width="300" height="80" rx="14" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="480" y="518" fill="#0f172a" font-weight="700">Moderation</text>
      <text x="645" y="518" fill="#b91c1c">aus</text>

      <rect x="810" y="470" width="300" height="80" rx="14" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="840" y="518" fill="#0f172a" font-weight="700">Tickets</text>
      <text x="1005" y="518" fill="#b91c1c">aus</text>
    </g>

    <text x="90" y="610" fill="#64748b" font-size="18">Deaktivierte Module blockieren passende Commands mit einem Hinweis.</text>
  </g>
</svg>
